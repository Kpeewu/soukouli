name: Build and publish demo image

# Image de l'instance de demonstration, publiee sous le tag "demo" pour ne
# jamais interferer avec "latest" (les installations client).
#
# Il n'existe pas de Dockerfile specifique a la demo : c'est le meme build,
# le mode demonstration etant pilote par DEMO_MODE dans .env. Ce workflow
# existe pour que le tag "demo" suive la branche du meme nom, et pour
# publier une image multi-architecture (amd64 + arm64), utilisable aussi
# bien sur un VPS x86 que sur un Mac Apple Silicon.
#
# Chaque architecture est construite sur un runner NATIF puis les deux
# images sont reunies en un manifeste unique. L'emulation QEMU serait ici
# redhibitoire : l'image installe TeX Live et compile onze extensions PHP.

on:
  push:
    branches:
      - demo
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: kpeewu/soukouli
  TAG: demo

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          # Runner ARM natif. Gratuit sur les depots publics ; sur un depot
          # prive il est facture, voir la note en fin de fichier.
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normaliser le nom de la plateforme
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Publication par digest : aucun tag n'est pose ici. Sans cela, les
      # deux jobs ecraseraient tour a tour le meme tag et la derniere
      # architecture publiee gagnerait, au lieu de coexister.
      - name: Build et publication par digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            APP_VERSION=${{ env.TAG }}
          cache-from: type=gha,scope=demo-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=demo-${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Exporter le digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Televerser le digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publier le manifeste multi-arch
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Recuperer les digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Reunit les images par architecture sous un tag unique. Docker
      # selectionne ensuite automatiquement la bonne variante au pull.
      - name: Creer et publier le manifeste
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:${TAG}-${GITHUB_SHA::7}" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Verifier les architectures publiees
        run: |
          docker buildx imagetools inspect "${IMAGE}:${TAG}"

# ---------------------------------------------------------------------------
# Si le depot est prive et que les runners ARM ne sont pas disponibles,
# remplacer la matrice par un job unique utilisant l'emulation :
#
#   - uses: docker/setup-qemu-action@v3
#   - uses: docker/build-push-action@v6
#     with:
#       platforms: linux/amd64,linux/arm64
#       tags: kpeewu/soukouli:demo
#       push: true
#
# Fonctionnel, mais comptez plusieurs heures pour la variante arm64.
# ---------------------------------------------------------------------------
