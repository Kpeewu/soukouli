name: soukouli

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Aucun port publie par defaut : la base n'est joignable que depuis les
    # conteneurs app/scheduler via le reseau compose. Decommenter uniquement
    # pour un acces temporaire depuis un outil DB externe.
    # ports:
    #   - "127.0.0.1:5432:5432"

  app:
    image: ${DOCKER_IMAGE:-kpeewu/soukouli}:${APP_VERSION:-latest}
    restart: unless-stopped
    environment:
      CONTAINER_ROLE: app
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env
      - app_storage:/var/www/html/storage
      - public_assets:/var/www/html/public
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1',9000)?0:1);"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  scheduler:
    image: ${DOCKER_IMAGE:-kpeewu/soukouli}:${APP_VERSION:-latest}
    restart: unless-stopped
    command: ["/bin/sh", "-c", "while true; do php artisan schedule:run --no-interaction --verbose; sleep 60; done"]
    environment:
      CONTAINER_ROLE: scheduler
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env
      - app_storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy

  webserver:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # APP_BIND_IP vaut 0.0.0.0 par defaut : comportement inchange pour les
    # installations existantes. Derriere un reverse proxy installe sur la
    # meme machine, le mettre a 127.0.0.1 pour que l'application ne soit
    # joignable que par le proxy, et jamais directement depuis internet.
    ports:
      - "${APP_BIND_IP:-0.0.0.0}:${APP_PORT:-80}:80"
    volumes:
      - public_assets:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/up"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  app_storage:
  public_assets:
